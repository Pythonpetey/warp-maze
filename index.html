<!-- Firebase — free database for storing and loading maps by short code -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBDLyuI-z2809WC02UFLvD8d77QU6CY7G0",
  authDomain: "warp-maze.firebaseapp.com",
  projectId: "warp-maze",
  storageBucket: "warp-maze.firebasestorage.app",
  messagingSenderId: "8504842048",
  appId: "1:8504842048:web:bec7d72309c36c65dd0ca5",
  measurementId: "G-K6V53522SP"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

let db = null;
try {
  const app = initializeApp(FIREBASE_CONFIG);
  db = getFirestore(app);
} catch(e) { console.warn('Firebase not configured:', e.message); }

// Save map, return 6-char code
window._fbSaveMap = async function(mapData) {
  if(!db) return null;
  try {
    // Generate a short 6-char alphanumeric code
    const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
    let code = '';
    for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
    await setDoc(doc(db, 'maps', code), {
      name: mapData.name,
      cols: mapData.cols,
      rows: mapData.rows,
      num_warps: mapData.num_warps||0,
      grid: mapData.grid,
      created: Date.now()
    });
    return code;
  } catch(e) { console.error('Firebase save failed:', e); return null; }
};

// Load map by 6-char code
window._fbLoadMap = async function(code) {
  if(!db) return null;
  try {
    const snap = await getDoc(doc(db, 'maps', code));
    return snap.exists() ? snap.data() : null;
  } catch(e) { console.error('Firebase load failed:', e); return null; }
};
</script>

<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────
const EMPTY=0,WALL=1,START=2,END=3,ITEM=4,ENEMY=5,LAVA=6,WARP=7;
const ED_COLS=40,ED_ROWS=30;

function warpColor(idx){
  const hue=(idx*137.508)%360,s=0.75+0.2*((idx%3)/3),v=0.85+0.12*((idx%5)/5);
  const h=hue/60,i=Math.floor(h),f=h-i,p=v*(1-s),q=v*(1-s*f),t=v*(1-s*(1-f));
  const m=[[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i%6];
  return `rgb(${Math.round(m[0]*255)},${Math.round(m[1]*255)},${Math.round(m[2]*255)})`;
}


// ── Cloud storage via Firebase (set up in the module script above) ────────────
// Falls back gracefully to local-only if Firebase isn't configured yet.
async function saveToCloud(mapData){
  if(window._fbSaveMap) return await window._fbSaveMap(mapData);
  return null;
}
async function loadFromCloud(code){
  if(window._fbLoadMap) return await window._fbLoadMap(code);
  return null;
}
function isShortCode(str){ return /^[a-z2-9]{6}$/i.test(str); }

// ── Local saved codes ────────────────────────────────────────────────────────
const LS_KEY='warp_maze_saved';
function getSaved(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch{return[];}}
function addSaved(code,name){
  const s=getSaved().filter(x=>x.code!==code);
  s.unshift({code,name,ts:Date.now()});
  localStorage.setItem(LS_KEY,JSON.stringify(s.slice(0,20)));
}
function removeSaved(code){
  localStorage.setItem(LS_KEY,JSON.stringify(getSaved().filter(x=>x.code!==code)));
}

// ── Encode / decode ──────────────────────────────────────────────────────────
function encodeMap(data){
  const raw=JSON.stringify({name:data.name,cols:data.cols,rows:data.rows,
    num_warps:data.num_warps||0,grid:data.grid});
  const comp=pako.deflate(raw);
  return btoa(String.fromCharCode(...comp)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function decodeMap(code){
  const bin=atob(code.replace(/-/g,'+').replace(/_/g,'/'));
  const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
  if(bytes[0]===0x78){return JSON.parse(pako.inflate(bytes,{to:'string'}));}
  return JSON.parse(decodeURIComponent(escape(bin)));
}

// ── Navigation ───────────────────────────────────────────────────────────────
let currentPage='home';
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-bar').classList.toggle('show',name!=='home');
  document.getElementById('game-hud').style.display=name==='game'?'flex':'none';

  const tb=document.getElementById('tab-'+name);
  if(tb)tb.classList.add('active');
  currentPage=name;
  if(name==='game'){resizeCanvas();recenter();}
  if(name==='editor'){edResizeCanvas();}
}
function goHome(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  document.getElementById('win-overlay').classList.remove('show');
  showPage('home');
  document.getElementById('tab-bar').classList.remove('show');
  renderSavedList();
}

// ── Map loading ──────────────────────────────────────────────────────────────
async function loadCode(){
  const raw=document.getElementById('code-input').value.trim();
  if(!raw){document.getElementById('load-error').textContent='Enter a code first.';return;}
  document.getElementById('load-error').textContent='Loading…';
  try{
    let data=null;
    // Short 6-char Firebase code e.g. "ab3x9z"
    if(isShortCode(raw)){
      data = await loadFromCloud(raw);
      if(!data) throw new Error('Code not found — it may have expired.');
    }
    // Long compressed code fallback
    if(!data) data = decodeMap(raw);
    if(!data) throw new Error('null');
    initMap(data, raw);
    document.getElementById('load-error').textContent='';
  }catch(e){
    console.error(e);
    document.getElementById('load-error').textContent = e.message || 'Could not load — check the code is correct.';
  }
}

function loadDemo(){
  const C=24,R=16;
  const g=Array.from({length:R},()=>Array(C).fill(EMPTY));
  for(let c=0;c<C;c++){g[0][c]=WALL;g[R-1][c]=WALL;}
  for(let r=0;r<R;r++){g[r][0]=WALL;g[r][C-1]=WALL;}
  [[2,2],[2,3],[2,4],[3,4],[4,4],[4,3],[6,2],[6,3],[6,4],[6,5],
   [8,3],[8,4],[9,4],[10,4],[10,5],[10,6],[12,2],[12,3],[14,3],[14,4],[14,5]]
    .forEach(([r,c])=>{if(r<R&&c<C)g[r][c]=WALL;});
  g[1][1]=START; g[R-2][C-2]=END;
  [[2,6],[5,14],[8,10],[4,20]].forEach(([r,c])=>{if(r<R&&c<C)g[r][c]=ITEM;});
  [[3,10],[7,4]].forEach(([r,c])=>{if(r<R&&c<C)g[r][c]=ENEMY;});
  g[3][15]=LAVA; g[3][16]=LAVA; g[3][17]=LAVA;
  g[1][4]=WARP; g[7][12]=WARP;
  g[4][8]=WARP+1; g[9][20]=WARP+1;
  g[6][16]=WARP+2; g[12][8]=WARP+2;
  initMap({name:'Demo',cols:C,rows:R,num_warps:3,grid:g},'demo');
}

// ── Game state ───────────────────────────────────────────────────────────────
let mapData=null,playerX=0,playerY=0;
let steps=0,warpsUsed=0,collectedItems=new Set(),totalItems=0;
let blocked=false,animFrame=null,camX=0,camY=0,TILE=24;
let warpTargets={},currentCode='';
let touchStartX=0,touchStartY=0,touchMoved=false;

function initMap(data,code=''){
  mapData=data; currentCode=code;
  warpTargets={};
  for(let r=0;r<data.rows;r++)
    for(let c=0;c<data.cols;c++){
      const v=data.grid[r][c];
      if(v>=WARP){if(!warpTargets[v])warpTargets[v]=[];warpTargets[v].push([c,r]);}
    }
  totalItems=0;
  for(let r=0;r<data.rows;r++)for(let c=0;c<data.cols;c++)if(data.grid[r][c]===ITEM)totalItems++;
  document.getElementById('hud-name').textContent=data.name;
  showPage('game');
  resetPlayer();
  updateBestDisplay();
}

function resizeCanvas(){
  if(!mapData)return;
  const page=document.getElementById('page-game');
  const dpad=document.getElementById('dpad-bar');
  const VW=page.clientWidth, VH=page.clientHeight-(dpad.offsetHeight||0);
  const c=document.getElementById('canvas');
  c.width=VW; c.height=VH;
  TILE=Math.max(12,Math.min(40,Math.floor(Math.min(VW/15,VH/12))));
}
window.addEventListener('resize',()=>{
  if(currentPage==='game')resizeCanvas();
  if(currentPage==='editor')edResizeCanvas();
});

function resetPlayer(){
  collectedItems.clear(); steps=0; warpsUsed=0; blocked=false;
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('msg-box').classList.remove('show');
  outer:for(let r=0;r<mapData.rows;r++)
    for(let c=0;c<mapData.cols;c++)
      if(mapData.grid[r][c]===START){playerX=c;playerY=r;break outer;}
  updateHUD(); resizeCanvas(); recenter();
  if(animFrame)cancelAnimationFrame(animFrame);
  loop();
}

function recenter(){
  if(!mapData)return;
  const c=document.getElementById('canvas');
  const VW=c.width,VH=c.height;
  camX=Math.max(0,Math.min(Math.max(0,mapData.cols*TILE-VW),playerX*TILE-VW/2+TILE/2));
  camY=Math.max(0,Math.min(Math.max(0,mapData.rows*TILE-VH),playerY*TILE-VH/2+TILE/2));
}

// ── Input ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(currentPage!=='game'||blocked)return;
  const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
           w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  const v=m[e.key];if(v){e.preventDefault();tryMove(...v);}
});
['u','d','l','r'].forEach(dir=>{
  const el=document.getElementById('dp-'+dir);
  const deltas={u:[0,-1],d:[0,1],l:[-1,0],r:[1,0]};
  el.addEventListener('pointerdown',e=>{
    e.preventDefault();el.classList.add('pressed');
    if(!blocked&&currentPage==='game')tryMove(...deltas[dir]);
  });
  el.addEventListener('pointerup',()=>el.classList.remove('pressed'));
  el.addEventListener('pointerleave',()=>el.classList.remove('pressed'));
});
const gp=document.getElementById('page-game');
gp.addEventListener('touchstart',e=>{
  if(e.target.closest('#dpad-bar'))return;
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; touchMoved=false;
},{passive:true});
gp.addEventListener('touchmove',e=>{touchMoved=true;e.preventDefault();},{passive:false});
gp.addEventListener('touchend',e=>{
  if(e.target.closest('#dpad-bar'))return;
  if(blocked||!touchMoved)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
  if(Math.abs(dx)>Math.abs(dy))tryMove(dx>0?1:-1,0);
  else tryMove(0,dy>0?1:-1);
},{passive:true});

function tryMove(dx,dy){
  const nx=playerX+dx,ny=playerY+dy;
  if(nx<0||nx>=mapData.cols||ny<0||ny>=mapData.rows)return;
  const tile=mapData.grid[ny][nx];
  if(tile===WALL)return;
  playerX=nx; playerY=ny; steps++;
  if(tile===ITEM&&!collectedItems.has(`${ny},${nx}`)){
    collectedItems.add(`${ny},${nx}`); showMsg('ITEM','★ You found an item!');
  }else if(tile===LAVA){
    lavaKill(); return;
  }else if(tile===ENEMY){
    showMsg('ENEMY','! Enemy! +5 step penalty',true); steps+=5;
  }else if(tile>=WARP){
    doWarp(tile); return;
  }else if(tile===END){
    win(); return;
  }
  updateHUD();
}

function doWarp(wv){
  warpsUsed++;
  const others=(warpTargets[wv]||[]).filter(([c,r])=>!(c===playerX&&r===playerY));
  flashWarp(()=>{
    if(others.length){const t=others[Math.floor(Math.random()*others.length)];playerX=t[0];playerY=t[1];}
    updateHUD(); blocked=false;
  });
}

function flashWarp(cb){
  blocked=true;
  const f=document.getElementById('warp-flash');
  f.style.background='white';
  f.style.transition='opacity 0.1s'; f.style.opacity='1';
  setTimeout(()=>{f.style.transition='opacity 0.22s';f.style.opacity='0';setTimeout(cb,240);},110);
}

function lavaKill(){
  blocked=true;
  const f=document.getElementById('warp-flash');
  f.style.background='#ff4400';
  f.style.transition='opacity 0.08s'; f.style.opacity='0.9';
  setTimeout(()=>{
    f.style.transition='opacity 0.4s'; f.style.opacity='0';
    setTimeout(()=>{f.style.background='white';},500);
  },180);
  showMsg('☠ LAVA','You fell in the lava! Restarting…',true);
  setTimeout(()=>{blocked=false;resetPlayer();},1600);
}

// ── Leaderboard (localStorage per map, keyed by map name) ────────────────────
function lbKey(name){ return `wm_lb_${name}`; }
function getLB(name){
  try{ return JSON.parse(localStorage.getItem(lbKey(name))||'null'); }catch{ return null; }
}
function saveLB(name, steps){
  const cur=getLB(name);
  if(!cur || steps < cur.steps){
    localStorage.setItem(lbKey(name), JSON.stringify({steps, ts:Date.now()}));
    return true; // new record
  }
  return false;
}
function updateBestDisplay(){
  const best=getLB(mapData?.name);
  document.getElementById('hud-best').textContent = best ? `${best.steps}` : '—';
}

function win(){
  const isRecord = saveLB(mapData.name, steps);
  updateBestDisplay();
  const best = getLB(mapData.name);
  let statsHtml = `Steps: <strong>${steps}</strong><br>Items: ${collectedItems.size} / ${totalItems}<br>Warps: ${warpsUsed}`;
  if(isRecord) statsHtml += `<br><span style="color:var(--gold)">🏆 NEW BEST!</span>`;
  else if(best) statsHtml += `<br>Best: ${best.steps} steps`;
  document.getElementById('win-stats').innerHTML = statsHtml;
  document.getElementById('win-overlay').classList.add('show');
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
}
function updateHUD(){
  document.getElementById('hud-steps').textContent=steps;
  document.getElementById('hud-items').textContent=`${collectedItems.size}/${totalItems}`;
  updateBestDisplay();
}
let msgTimer=null;
function showMsg(title,text,long=false){
  const b=document.getElementById('msg-box');
  document.getElementById('msg-title').textContent=title;
  document.getElementById('msg-text').textContent=text;
  b.classList.add('show');
  if(msgTimer)clearTimeout(msgTimer);
  msgTimer=setTimeout(()=>b.classList.remove('show'),long?2000:1200);
}

// ── Render ───────────────────────────────────────────────────────────────────
function loop(){render();animFrame=requestAnimationFrame(loop);}

function render(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const T=TILE,VW=canvas.width,VH=canvas.height,g=mapData.grid,now=Date.now();
  // Smooth camera follow
  const tcx=playerX*T-VW/2+T/2, tcy=playerY*T-VH/2+T/2;
  camX+=(Math.max(0,Math.min(Math.max(0,mapData.cols*T-VW),tcx))-camX)*0.18;
  camY+=(Math.max(0,Math.min(Math.max(0,mapData.rows*T-VH),tcy))-camY)*0.18;
  ctx.clearRect(0,0,VW,VH);
  const c0=Math.max(0,Math.floor(camX/T)), r0=Math.max(0,Math.floor(camY/T));
  const c1=Math.min(mapData.cols,c0+Math.ceil(VW/T)+2);
  const r1=Math.min(mapData.rows,r0+Math.ceil(VH/T)+2);
  for(let r=r0;r<r1;r++){
    for(let c=c0;c<c1;c++){
      const val=g[r][c];
      const x=Math.floor(c*T-camX), y=Math.floor(r*T-camY);
      if(val===WALL){
        ctx.fillStyle='#2a1e10';ctx.fillRect(x,y,T,T);
        if(T>=16){ctx.fillStyle='#3c2c18';ctx.fillRect(x+1,y+1,T-2,4);ctx.fillRect(x+1,y+8,T-2,4);}
      }else{
        ctx.fillStyle=(r+c)%2===0?'#10102a':'#13132e';ctx.fillRect(x,y,T,T);
        if(val===START){ctx.fillStyle='#183524';ctx.fillRect(x,y,T,T);drawLabel(ctx,'S','#4dff91',x,y,T);}
        else if(val===END){ctx.fillStyle='#32101a';ctx.fillRect(x,y,T,T);drawLabel(ctx,'E','#ff4d6d',x,y,T);}
        else if(val===ITEM&&!collectedItems.has(`${r},${c}`)){
          const p=0.6+0.4*Math.sin(now/280);
          ctx.fillStyle=`rgba(255,210,60,${p})`;
          ctx.beginPath();ctx.arc(x+T/2,y+T/2,Math.max(2,T*.35),0,Math.PI*2);ctx.fill();
          if(T>=16)drawLabel(ctx,'*','#fff',x,y,T);
        }else if(val===ENEMY){
          const bob=T>=14?Math.sin(now/380)*2:0;
          ctx.fillStyle='#ff4d80';
          ctx.beginPath();ctx.arc(x+T/2,y+T/2+bob,Math.max(2,T*.34),0,Math.PI*2);ctx.fill();
          if(T>=14)drawLabel(ctx,'!','#fff',x,y+bob,T);
        }else if(val===LAVA){
          const fl=0.75+0.25*Math.sin(now/120+c*0.8+r*0.6);
          ctx.fillStyle=`rgb(${Math.round(200+40*fl)},${Math.round(40+20*fl)},10)`;
          ctx.fillRect(x,y,T,T);
          ctx.fillStyle=`rgba(255,200,0,${0.3+0.4*Math.sin(now/90+c+r)})`;
          ctx.fillRect(x+T*.2,y+T*.1,T*.15,T*.8);
          ctx.fillRect(x+T*.6,y+T*.3,T*.12,T*.5);
        }else if(val>=WARP){
          const col=warpColor(val-WARP);
          if(T>=12){
            const gr=ctx.createRadialGradient(x+T/2,y+T/2,1,x+T/2,y+T/2,T/2);
            gr.addColorStop(0,'rgba(255,255,255,.45)');
            gr.addColorStop(.5,col.replace('rgb','rgba').replace(')',',0.73)'));
            gr.addColorStop(1,col.replace('rgb','rgba').replace(')',',0.13)'));
            ctx.fillStyle=gr;
          }else ctx.fillStyle=col;
          ctx.fillRect(x,y,T-1,T-1);
          if(T>=14){
            ctx.save();ctx.translate(x+T/2,y+T/2);ctx.rotate(now/550);
            ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
            for(let i=0;i<4;i++){ctx.rotate(Math.PI/2);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(T/2-1,0);ctx.stroke();}
            ctx.restore();
          }
        }
      }
    }
  }
  // Player
  const px=Math.floor(playerX*T-camX+T/2), py=Math.floor(playerY*T-camY+T/2);
  const bob=T>=14?Math.sin(now/240)*1.5:0, pr=Math.max(4,T*.42);
  const bp=(Math.sin(now/400)+1)/2;
  ctx.beginPath();ctx.arc(px,py,pr+4+bp*8,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,216,77,${0.6-bp*0.5})`;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.ellipse(px,py+pr*.6,pr*.7,Math.max(2,pr*.25),0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffd84d';ctx.beginPath();ctx.arc(px,py+bob,pr,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#a88820';ctx.lineWidth=2;ctx.stroke();
  if(T>=14){
    const er=Math.max(1.5,pr*.22); ctx.fillStyle='#1a1a2e';
    ctx.beginPath();ctx.arc(px-pr*.4,py-pr*.28+bob,er,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+pr*.4,py-pr*.28+bob,er,0,Math.PI*2);ctx.fill();
  }
}
function drawLabel(ctx,text,color,x,y,T){
  ctx.fillStyle=color;ctx.font=`bold ${Math.max(9,T-5)}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x+T/2,y+T/2);
}

// ── In-browser editor ────────────────────────────────────────────────────────
let edGrid=null,edTile=1,edNumWarps=0,edWarpCounts=[],edDrawing=false,edHistory=[];
let edCamX=0,edCamY=0,edTileSize=18,edPanning=false,edPanStart=[0,0],edCamStart=[0,0];

function edInit(){
  edGrid=Array.from({length:ED_ROWS},()=>Array(ED_COLS).fill(EMPTY));
  edNumWarps=0;edWarpCounts=[];edHistory=[];edResizeCanvas();edRender();
}
function edResizeCanvas(){
  const wrap=document.getElementById('ed-canvas-wrap');
  const c=document.getElementById('ed-canvas');
  c.width=wrap.clientWidth;c.height=wrap.clientHeight;edRender();
}
function edSelTile(t){
  edTile=t;
  document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('active'));
  const ids={0:'ep-erase',1:'ep-wall',2:'ep-start',3:'ep-end',4:'ep-item',5:'ep-enemy',6:'ep-lava'};
  if(ids[t])document.getElementById(ids[t]).classList.add('active');
  else{
    document.querySelectorAll('[id^=ep-warp-]').forEach(b=>b.classList.remove('active'));
    const wb=document.getElementById(`ep-warp-${t-WARP}`);
    if(wb)wb.classList.add('active');
  }
}
function edAddWarp(){
  edWarpCounts.push(0);edNumWarps++;
  const i=edNumWarps-1,col=warpColor(i);
  const div=document.createElement('button');
  div.className='ep-btn';div.id=`ep-warp-${i}`;
  div.innerHTML=`<span class="ep-swatch" style="background:${col}"></span>Warp ${i+1} [0/2]`;
  div.onclick=()=>edSelTile(WARP+i);
  document.getElementById('ep-warps').appendChild(div);
  edSelTile(WARP+i);epMsg(`Added Warp ${i+1} — place 2 tiles`);
}
function edPlace(c,r){
  if(c<0||c>=ED_COLS||r<0||r>=ED_ROWS)return;
  edPushHistory();
  if(edTile===EMPTY){
    const old=edGrid[r][c];
    if(old>=WARP)edWarpCounts[old-WARP]=Math.max(0,edWarpCounts[old-WARP]-1);
    edGrid[r][c]=EMPTY;
  }else if(edTile>=WARP){
    const wi=edTile-WARP;
    if(edWarpCounts[wi]>=2){epMsg(`Warp ${wi+1} already has 2 tiles!`);return;}
    const old=edGrid[r][c];
    if(old>=WARP&&old!==edTile)edWarpCounts[old-WARP]=Math.max(0,edWarpCounts[old-WARP]-1);
    edGrid[r][c]=edTile;edWarpCounts[wi]++;
    const btn=document.getElementById(`ep-warp-${wi}`);
    if(btn)btn.innerHTML=`<span class="ep-swatch" style="background:${warpColor(wi)}"></span>Warp ${wi+1} [${edWarpCounts[wi]}/2]`;
  }else{
    const old=edGrid[r][c];
    if(old>=WARP)edWarpCounts[old-WARP]=Math.max(0,edWarpCounts[old-WARP]-1);
    edGrid[r][c]=edTile;
  }
  edRender();
}
function edPushHistory(){
  edHistory.push({grid:edGrid.map(r=>[...r]),wc:[...edWarpCounts]});
  if(edHistory.length>40)edHistory.shift();
}
function edUndo(){
  if(!edHistory.length){epMsg('Nothing to undo');return;}
  const s=edHistory.pop();edGrid=s.grid;edWarpCounts=s.wc;edRender();
}
function edClear(){
  edPushHistory();
  edGrid=Array.from({length:ED_ROWS},()=>Array(ED_COLS).fill(EMPTY));
  edWarpCounts=edWarpCounts.map(()=>0);edRender();epMsg('Grid cleared');
}
function epMsg(t){
  const el=document.getElementById('ep-msg');el.textContent=t;
  setTimeout(()=>{if(el.textContent===t)el.textContent='';},2500);
}
async function edSaveMap(){
  const starts=edGrid.flat().filter(v=>v===START).length;
  const ends=edGrid.flat().filter(v=>v===END).length;
  if(!starts){epMsg('Need a Start tile!');return;}
  if(!ends){epMsg('Need an Exit tile!');return;}
  const badW=edWarpCounts.findIndex(c=>c===1);
  if(badW>=0){epMsg(`Warp ${badW+1} needs 2 tiles!`);return;}
  epMsg('Saving to cloud…');
  const name=document.getElementById('ed-name-input').value.trim()||'My Map';
  const data={name,cols:ED_COLS,rows:ED_ROWS,num_warps:edNumWarps,grid:edGrid};

  // Try to save to Firebase for a short code
  const shortCode = await saveToCloud(data);
  let displayCode;
  if(shortCode){
    displayCode = shortCode;
    epMsg(`Saved! Code: ${shortCode}`);
  } else {
    // Firebase not configured — fall back to long compressed code
    displayCode = encodeMap(data);
    epMsg('Saved (no Firebase — long code)');
  }
  addSaved(displayCode, name);
  currentCode=displayCode; mapData=data;
  document.getElementById('hud-name').textContent=name;
  openShareWith(displayCode);
  renderSavedList();
}
const edC=document.getElementById('ed-canvas');
edC.addEventListener('mousedown',e=>{
  if(e.button===1){edPanning=true;edPanStart=[e.offsetX,e.offsetY];edCamStart=[edCamX,edCamY];return;}
  edDrawing=true;edPlace(...edXY(e.offsetX,e.offsetY));
});
edC.addEventListener('mousemove',e=>{
  if(edPanning){edCamX=edCamStart[0]-(e.offsetX-edPanStart[0]);edCamY=edCamStart[1]-(e.offsetY-edPanStart[1]);edClampCam();edRender();return;}
  if(edDrawing)edPlace(...edXY(e.offsetX,e.offsetY));
});
edC.addEventListener('mouseup',()=>{edDrawing=false;edPanning=false;});
edC.addEventListener('mouseleave',()=>{edDrawing=false;edPanning=false;});
edC.addEventListener('contextmenu',e=>{
  e.preventDefault();const[c,r]=edXY(e.offsetX,e.offsetY);
  const saved=edTile;edTile=EMPTY;edPlace(c,r);edTile=saved;
});
edC.addEventListener('wheel',e=>{
  e.preventDefault();
  const old=edTileSize;
  edTileSize=Math.max(6,Math.min(48,edTileSize-(e.deltaY>0?2:-2)));
  const scale=edTileSize/old;
  edCamX=(edCamX+e.offsetX)*scale-e.offsetX;
  edCamY=(edCamY+e.offsetY)*scale-e.offsetY;
  edClampCam();edRender();
},{passive:false});
edC.addEventListener('touchstart',e=>{
  e.preventDefault();const t=e.touches[0];edDrawing=true;
  const rect=edC.getBoundingClientRect();
  edPlace(...edXY(t.clientX-rect.left,t.clientY-rect.top));
},{passive:false});
edC.addEventListener('touchmove',e=>{
  e.preventDefault();const t=e.touches[0];
  const rect=edC.getBoundingClientRect();
  if(edDrawing)edPlace(...edXY(t.clientX-rect.left,t.clientY-rect.top));
},{passive:false});
edC.addEventListener('touchend',()=>{edDrawing=false;});
function edXY(px,py){
  return[Math.floor((px+edCamX)/edTileSize),Math.floor((py+edCamY)/edTileSize)];
}
function edClampCam(){
  edCamX=Math.max(0,Math.min(edCamX,ED_COLS*edTileSize-edC.width));
  edCamY=Math.max(0,Math.min(edCamY,ED_ROWS*edTileSize-edC.height));
}
function edRender(){
  const c=document.getElementById('ed-canvas');
  if(!c.width)return;
  const ctx=c.getContext('2d'),T=edTileSize;
  ctx.clearRect(0,0,c.width,c.height);
  const c0=Math.max(0,Math.floor(edCamX/T)),r0=Math.max(0,Math.floor(edCamY/T));
  const c1=Math.min(ED_COLS,c0+Math.ceil(c.width/T)+2);
  const r1=Math.min(ED_ROWS,r0+Math.ceil(c.height/T)+2);
  for(let r=r0;r<r1;r++){
    for(let cc=c0;cc<c1;cc++){
      const v=edGrid[r][cc],x=Math.floor(cc*T-edCamX),y=Math.floor(r*T-edCamY);
      if(v===WALL){ctx.fillStyle='#3c2c18';ctx.fillRect(x,y,T,T);}
      else if(v===EMPTY){ctx.fillStyle=(r+cc)%2===0?'#10102a':'#13132e';ctx.fillRect(x,y,T,T);}
      else if(v===START){ctx.fillStyle='#1a4028';ctx.fillRect(x,y,T,T);drawLabel(ctx,'S','#4dff91',x,y,T);}
      else if(v===END){ctx.fillStyle='#401020';ctx.fillRect(x,y,T,T);drawLabel(ctx,'E','#ff4d6d',x,y,T);}
      else if(v===ITEM){ctx.fillStyle='#403808';ctx.fillRect(x,y,T,T);if(T>=10)drawLabel(ctx,'*','#ffd84d',x,y,T);}
      else if(v===ENEMY){ctx.fillStyle='#401028';ctx.fillRect(x,y,T,T);if(T>=10)drawLabel(ctx,'!','#ff4d80',x,y,T);}
      else if(v===LAVA){ctx.fillStyle='#c83c0a';ctx.fillRect(x,y,T,T);if(T>=10)drawLabel(ctx,'~','#ffaa44',x,y,T);}
      else{ctx.fillStyle=warpColor(v-WARP);ctx.fillRect(x,y,T,T);}
      if(T>=6){ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=0.5;ctx.strokeRect(x,y,T,T);}
    }
  }
}

// ── Saved list ───────────────────────────────────────────────────────────────
function renderSavedList(){
  const saved=getSaved();
  const el=document.getElementById('saved-list');
  const items=document.getElementById('saved-items');
  if(!saved.length){el.style.display='none';return;}
  el.style.display='block'; items.innerHTML='';
  saved.forEach(s=>{
    const d=document.createElement('div');
    d.className='saved-item';
    const shortDisp=s.code.length<=8?s.code:s.code.slice(0,6)+'…';
    d.innerHTML=`<span class="si-code">${shortDisp}</span><span class="si-name">${s.name}</span><span class="si-del" onclick="event.stopPropagation();removeSaved('${s.code.slice(0,8)}');renderSavedList()">✕</span>`;
    d.addEventListener('click',()=>{document.getElementById('code-input').value=s.code;loadCode();});
    items.appendChild(d);
  });
}

// ── Share ─────────────────────────────────────────────────────────────────────
function openShare(){if(!mapData)return;openShareWith(currentCode||encodeMap(mapData));}

function openShareWith(code){
  // If it's a short code, the share link IS the code — friends just type it in
  // If it's a long code, show it truncated with copy button
  const isShort = isShortCode(code);
  const shareLink = isShort
    ? `${location.origin}${location.pathname}#${code}`
    : `${location.origin}${location.pathname}#${code}`;

  document.getElementById('share-short-box').textContent = isShort ? code : code.slice(0,20)+'…';
  document.getElementById('share-short-box').dataset.url = isShort ? code : code;
  document.getElementById('share-url-box').value = shareLink;
  document.getElementById('share-msg').textContent = isShort
    ? '✓ Short code — friends just type this in!'
    : 'No Firebase configured — share the full link below';
  document.getElementById('native-share-btn').style.display = navigator.share ? 'inline-flex' : 'none';
  document.getElementById('share-modal').classList.add('open');
}

function closeShare(){document.getElementById('share-modal').classList.remove('open');}

function copyShort(){
  // Copy the short code if available, otherwise the full URL
  const box = document.getElementById('share-short-box');
  const code = box.dataset.url || box.textContent;
  const isShort = isShortCode(code);
  const toCopy = isShort ? code : document.getElementById('share-url-box').value;
  navigator.clipboard?.writeText(toCopy)
    .then(()=>{document.getElementById('share-msg').textContent='✓ Copied!';})
    .catch(()=>{document.getElementById('share-msg').textContent='Select the text above to copy';});
}
function copyCode(){copyShort();}

function nativeShare(){
  const isShort = isShortCode(document.getElementById('share-short-box').dataset.url||'');
  const url = isShort
    ? `${location.origin}${location.pathname}#${document.getElementById('share-short-box').dataset.url}`
    : document.getElementById('share-url-box').value;
  navigator.share({title:'Warp Maze',text:`Can you solve the ${mapData?.name||'warp maze'}? Code: ${document.getElementById('share-short-box').dataset.url}`,url}).catch(()=>{});
}

// ── Boot ─────────────────────────────────────────────────────────────────────
edInit();
renderSavedList();

window.addEventListener('load', async ()=>{
  const hash = location.hash.slice(1);
  if(!hash) return;
  try{
    let data = null;
    // Short 6-char Firebase code in hash
    if(isShortCode(hash)){
      data = await loadFromCloud(hash);
    }
    // Long compressed code in hash
    if(!data) data = decodeMap(hash);
    if(data) initMap(data, hash);
  }catch(e){
    document.getElementById('code-input').value = hash;
    document.getElementById('load-error').textContent = 'Could not auto-load — click PLAY to try manually';
  }
});
</script>
